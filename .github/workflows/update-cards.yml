name: Update README cards

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&card_width=320&theme=transparent&border_radius=11&locale=fr&title_color=a277ff
          path: assets/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/top-langs.svg

          LAST_COMMIT=$(git log -1 --pretty=%B)
          COMMIT_NAME="Update README cards"
          if [ "$LAST_COMMIT" = "$COMMIT_NAME" ]; then
            git commit --amend --no-edit || exit 0
            git push --force-with-lease
          else
            git commit -m "$COMMIT_NAME" || exit 0
            git push
          fi
